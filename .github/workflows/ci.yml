name: CI — Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: 🧪 Run 40 Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Code checkout 
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Step 2 — Python setup 
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"  # Dependencies cache  — fast build

      # Step 3 — Install Dependencies 
      - name: 📦 Install dependencies
        run: pip install -r requirements.txt pytest pytest-django

      # Step 4 — Tests run 
      # Set Env variables  — .env file
      - name: ✅ Run tests
        env:
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
          # PostgreSQL 
          DB_NAME: "test_db"
          DB_USER: "postgres"
          DB_PASSWORD: "test"
          DB_HOST: "localhost"
          DB_PORT: "5432"
        run: pytest users/tests.py -v

      # Step 5 — Show Summary 
      - name: 📊 Test Summary
        if: always()
        run: echo "Tests complete — check logs above for details"
